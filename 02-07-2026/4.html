<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>JavaScript Comparison operators</h1>
    <p id="demo"></p>
    <p id="demo1"></p>
    <p id="demo2"></p>
    <p id="demo3"></p>
    <p id="demo4"></p>
    <p id="demo5"></p>
    <p id="demo6"></p>
    <p id="demo7"></p>
    <p id="demo8"></p>
    <p id="demo9"></p>
    <p id="demo10"></p>
    <p id="demo11"></p>
    <p id="deemo12"></p>

    <script>
      let x = 5;
      document.getElementById("demo").innerHTML = x == 8;
      console.log(x);

      let y = 5;
      document.getElementById("demo1").innerHTML = y == 5;
      console.log(y);

      let z = 5;
      document.getElementById("demo2").innerHTML = z == "5";
      console.log(z);

      let a = 5;
      document.getElementById("demo3").innerHTML = a === 5;
      console.log(a);

      let b = 5;
      document.getElementById("demo4").innerHTML = a === "5";
      console.log(b);

      let c = 5;
      document.getElementById("demo5").innerHTML = c != 5;
      console.log(c);

      let d = 5;
      document.getElementById("demo6").innerHTML = d !== 5;
      console.log(d);

      let e = 5;
      document.getElementById("demo7").innerHTML = e !== "5";
      console.log(e);

      let f = 5;
      document.getElementById("demo8").innerHTML = f !== 8;
      console.log(f);

      let g = 5;
      document.getElementById("demo9").innerHTML = g > 8;
      console.log(g);

      let h = 5;
      document.getElementById("demo10").innerHTML = h < 8;
      console.log(h);

      let i = 5;
      document.getElementById("demo11").innerHTML = i >= 8;
      console.log(i);

      let j = 5;
      document.getElementById("demo12").innerHTML = j >= 8;
      console.log(j);
      
    </script>
  </body>
</html>
