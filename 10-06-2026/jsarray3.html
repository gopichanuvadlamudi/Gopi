<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

const scores = [45, 80, 20, 100, 60];

    // score update
const scoreUpdate=scores.map(score=>score+10);
console.log(scoreUpdate);

    //  add runs
const scoreAdd=scores.map(score=>score+5);
console.log(scoreAdd);

        // Get all scores greater than 50
const scoreGreater=scores.filter(score=>score>50);
console.log(scoreGreater);

        //    Get all scores greater than or equal to 80
const scoreEqual=scores.filter(score=>score>=80);
console.log(scoreEqual);

            //   Find the first score greater than 70
const scoreFirst=scores.find(score=>score>70);
console.log(scoreFirst);

                //  Find the first score equal to 100
const scoreMore=scores.find(score=>score>=100);
console.log(scoreMore);

                //    Calculate the TotalRUNS
const scoreRuns=scores.reduce((sum,score)=>sum+score,0);
console.log(scoreRuns);

            //   Calculate the average score
const scoretotal=scores.reduce((sum,score)=>sum+score,0);
const average = scoretotal / scores.length;
console.log(average);


    </script>
</body>
</html>
