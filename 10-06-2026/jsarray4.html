<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const students = [
  { name: "Ravi", marks: 90 },
  { name: "Priya", marks: 75 },
  { name: "Rahul", marks: 40 },
  { name: "Anu", marks: 95 }
];


                // Create an array containing only student names.
const studentNames = students.map(student=>student.name);
 console.log(studentNames);

                //    Create an array containing only student marks.
 const studentMarks = students.map(student=>student.marks);
 console.log(studentMarks);   

                    // Add 5 marks to every student.
const studentAdd = students.map(student=>student.marks+5);
 console.log(studentAdd); 

                    //  Get students who scored above 80.
const studentMore = students.filter(student=>student.marks>=80);
 console.log(studentMore); 

                        // Get students who scored below 50.
const studentBelow = students.filter(student=>student.marks<50);
 console.log(studentBelow);         
 
                        //  Find the student named “Rahul”.
const studentFor=students.find(student=>student.name="rahul");
console.log(studentFor);

                        // Find the first student who scored above 90
const studentFirst=students.find(student=>student.marks>90);
console.log(studentFirst);        

                        //  Calculate the total marks of all students.
const totalMarks = students.reduce((sum, student) => sum + student.marks, 0);
console.log(totalMarks);

    </script>
</body>
</html>
