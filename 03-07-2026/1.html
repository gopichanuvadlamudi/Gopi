<br>
<button onclick="progress(0)">0%</button>
<button onclick="progress(10)">10%</button>
<button onclick="progress(20)">20%</button>
<button onclick="progress(30)">30%</button>
<button onclick="progress(40)">40%</button>
<button onclick="progress(50)">50%</button>
<button onclick="progress(60)">60%</button>
<button onclick="progress(70)">70%</button>
<button onclick="progress(80)">80%</button>
<button onclick="progress(90)">90%</button>
<button onclick="progress(100)">100%</button>

<script>

function progress(value)
{
    document.getElementById("bar").style.width = value + "%";
    document.getElementById("bar").innerHTML = value + "%";
}

</script>
