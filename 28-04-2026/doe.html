<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Card</title>
  <style>
    *{
      margin:0;
      padding:50;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display: flex;
      justify-content:center;
      align-items:center;
      background:hsl(143, 79%, 34%);
      font-family: Arial, Helvetica, sans-serif;
    }

    .card{
      height:400px;
      width:400px;
      background:lab(96.76% -0.48 -0.72);
      border-radius:14px;
      padding:28px 24px 22px;
      text-align:center;
      box-shadow:0px 12px 25px hwb(0 15% 17% / 0.15);
    }

    .avatar{
      width:96px;
      height:96px;
      margin:0 auto 16px;
      border-radius:50%;
      border:4px solid #5cff85;
      overflow: hidden;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    h2{
      font-size:16px;
      font-weight:700;
      color:#222;
      margin-bottom:6px;
    }

    .divider{
      width:100%;
      height:1px;
      background:#e9e9e9;
      margin-bottom:18px;
    }

    .stats{
      display:flex;
      justify-content:space-between;
      padding:0 15px;
      margin-bottom:22px;
    }

    .stat .label{
      font-size:12px;
      color:#888;
    }

    .button{
      width:100%;
      border:none;
      padding:14px 0;
      border-radius:30px;
      font-size:14px;
      font-weight:600;
      color:white;
      background:linear-gradient(90deg,hsl(167, 100%, 65%),#a24cff);
      box-shadow:0px 8px 18px rgba(10, 10, 10, 0.35);
    }

  </style>
</head>
<body>

  <div class="card">
    <div class="avatar">
      <img src="https://mitsde.com/assets/images/course/pgdm/EMBA-Human-Resource-Management.jpg" alt="User Photo">
    </div>

    <h2>Gopi Chandu</h2>
    <p>Associate Software Engineer</p>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat">
        <div class="num">22.5k</div>
        <div class="label">Followers</div>
      </div>

      <div class="stat">
        <div class="num">843</div>
        <div class="label">Following</div>
      </div>

      <div class="stat">
        <div class="num">42</div>
        <div class="label">Projects</div>
      </div>
    </div>

    <button class="button">Connect </button>
  </div>

</body>
</html>
