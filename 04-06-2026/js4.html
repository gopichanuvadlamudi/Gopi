<body>
 <h1>JavaScript Airthmetic operators</h1>
<h3>The = Operator</h3>

<p id="demo"></p>
<p id="demo1"></p>
<p id="demo2"></p>
<p id="demo3"></p>
<p id="demo4"></p>
<p id="demo5"></p>
<p id="demo6"></p>

<script>
let x = 10;
document.getElementById("demo").innerHTML = "Value of x is =: " + x;
console.log(x);

let y = 10;
y += 5;
document.getElementById("demo1").innerHTML ="value of y is += : "+ y;
console.log(y);

let z = 10;
z -= 5;
document.getElementById("demo2").innerHTML ="value of z is -= : "+ z;
console.log(z);

let a = 10;
a *= 5;
document.getElementById("demo3").innerHTML ="value of a is *= : "+ a;
console.log(a);

let b = 10;
b **= 5;
document.getElementById("demo4").innerHTML ="value of b is ** : "+ b;
console.log(b);

let c = 10;
c /= 5;
document.getElementById("demo5").innerHTML = "value of c  / :"+ c;
console.log(c);

let d = 10;
d %= 5;
document.getElementById("demo6").innerHTML = "value of d  % :"+ d;
console.log(d);





</script>
</body>
