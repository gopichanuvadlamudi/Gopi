<!DOCTYPE html>
<html>
<head>
    <title>If Statement Example</title>
</head>
<body>
    <h1>if statement</h1>
    <h1>block of code to be executed if the condition is true</h1>
    <p id="demo"></p>
<script>
   let age = 18;
let text = "You can Not drive!";

if (age >= 18) {
  text = "You can drive!";
}

document.getElementById("demo").innerHTML = text;
    </script>

</body>
</html>
