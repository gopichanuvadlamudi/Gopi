<!DOCTYPE html>
<html>
<head>
    <title>Else If</title>
</head>
<body>

    <h2>Student Grade Checker</h2>
    <h1></h1>
    <p id="demo"></p>

    <script>
        let marks = 75;

        if (marks >= 90) {
            document.getElementById("demo").innerHTML = "Grade A";
            console.log("Grade A");
        }
        else if (marks >= 60) {
            document.getElementById("demo").innerHTML = "Grade B";
            console.log("Grade B");
        }
        else {
            document.getElementById("demo").innerHTML = "Grade C";
            console.log("Grade C");
        }
    </script>

</body>
</html>
