<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Responsive Icon Spin Animation</title>

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#111;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* ================= NAVBAR ================= */

    .navbar{
      width:100%;
      background:#000;
      padding:15px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logo{
      color:#fff;
      font-size:28px;
      font-weight:bold;
    }

    .nav-links{
      display:flex;
      gap:30px;
    }

    .nav-links a{
      text-decoration:none;
      color:#fff;
      font-size:18px;
      transition:0.3s;
    }

    .nav-links a:hover{
      color:cyan;
    }

    /* Hamburger */

    .hamburger{
      display:none;
      font-size:28px;
      color:#fff;
      cursor:pointer;
    }

    #menu-toggle{
      display:none;
    }

    /* ================= ICON SECTION ================= */

    .container{
      flex:1;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:40px;
      padding:40px;
      flex-wrap:wrap;
    }

    .icon-box{
      width:120px;
      height:120px;
      background:#222;
      border-radius:20px;
      display:flex;
      justify-content:center;
      align-items:center;
      transition:0.4s;
      cursor:pointer;
    }

    .icon-box i{
      font-size:50px;
      color:#fff;
      transition:0.5s;
    }

    .icon-box:hover i{
      animation:spin 1s linear infinite;
      color:cyan;
    }

    .icon-box:hover{
      box-shadow:0 0 20px cyan;
      transform:translateY(-10px);
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

    /* ================= MOBILE VIEW ================= */
    @media(max-width:767px){
        .hamburger{
            display: block;
        }
        .nav-links{
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%;
            background: #000;
            flex-direction: column;
            text-align: center;
            display: none;
            padding: 20px 0;
        }
        .nav-links a{
            padding: 12px;
            display: block;
        }
        #menu-toggle:checked ~.nav-links{
            display: flex;
        }
        .container{
            gap: 20px;
        }
        .icon-box{
            width: 90px;
            height: 90px;
        }
        .icon-box i{
        font-size:35px;
      }
    }

    /* ================= TABLET VIEW ================= */

    @media(max-width:992px){

      .container{
        gap:30px;
      }

      .icon-box{
        width:110px;
        height:110px;
      }

      .icon-box i{
        font-size:45px;
      }
    }

    /* ================= LAPTOP VIEW ================= */

    @media(max-width:1400px){

      .container{
        gap:40px;
      }

      .icon-box{
        width:120px;
        height:120px;
      }

      .icon-box i{
        font-size:50px;
      }
    }

  </style>
</head>

<body>

  <!-- Navbar -->

  <nav class="navbar">

    <div class="logo">LOGO</div>

    <!-- Hamburger -->

    <input type="checkbox" id="menu-toggle">

    <label for="menu-toggle" class="hamburger">
      <i class="fa-solid fa-bars"></i>
    </label>

    <!-- Nav Links -->

    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </div>

  </nav>

  <!-- Icons -->

  <div class="container">

    <div class="icon-box">
      <i class="fa-solid fa-gear"></i>
    </div>

    <div class="icon-box">
      <i class="fa-solid fa-star"></i>
    </div>

    <div class="icon-box">
      <i class="fa-solid fa-heart"></i>
    </div>

  </div>

</body>
</html>
