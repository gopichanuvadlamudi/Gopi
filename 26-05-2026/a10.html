<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shine Effect Animation</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
    }

    .shine-btn{
      position: relative;
      padding: 18px 45px;
      font-size: 22px;
      color: #fff;
      background: #00ff0d;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      overflow: hidden;
      letter-spacing: 1px;
      transition: 0.3s;
    }

    .shine-btn:hover{
      transform: scale(1.05);
      box-shadow: 0 0 20px red;
    }

    /* Shine Effect */
    .shine-btn::before{
      content: "";
      position: absolute;
      top: 0;
      left: -80px;
      width: 50px;
      height: 100%;
      background: rgba(255,255,255,0.6);
      transform: skewX(-25deg);
    }

    .shine-btn:hover::before{
      animation: shine 1s linear;
    }

    @keyframes shine{
      0%{
        left: -80px;
      }

      100%{
        left: 120%;
      }
    }
  </style>
</head>
<body>

  <button class="shine-btn">
    ANIMATIONS
  </button>

</body>
</html>
