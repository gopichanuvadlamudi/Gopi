<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Zoom In Animation</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#111;
    }

    .box{
      width:300px;
      padding:40px;
      background:#00bcd4;
      color:white;
      text-align:center;
      border-radius:20px;

      /* Zoom In Animation */
      animation:zoomout 2s ease;
    }

    @keyframes zoomout{

      from{
        transform:scale(1);
        opacity:1;
      }

      to{
        transform:scale(0);
        opacity:0;
      }

    }

  </style>

</head>
<body>

  <div class="box">
    <h1>Zoom In</h1>
    <p>This box zooms in using CSS animation.</p>
  </div>

</body>
</html>
