<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glassmorphism Hover Animation</title>

  <style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .body{
        height: 120vh;
        width:100%;
        display: flex;
        font-family: 'Times New Roman', Times, serif;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
        overflow: hidden;
    }
    .card{
        width: 320px;
        height: 420px;
        border-radius: 25px;
        background:rgba(255,255,255,0.1);
       border:1px solid rgba(255,255,255,0.2);
       backdrop-filter:blur(12px);
       box-shadow:0 8px 40px rgba(44, 163, 70, 0.3);

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:rgb(39, 24, 172);

      position:relative;
      overflow:hidden;

      transition:0.5s ease;
      cursor:pointer;
    }
    .card::before{
      content:"";
      position:absolute;
      width:150px;
      height:150px;
      background:rgba(228, 229, 99, 1.3);
      border-radius:50%;
      top:-40px;
      left:-40px;
      filter:blur(60px);
      transition:0.5s;
    }

    .card:hover::before{
      transform:scale(5.0);
      opacity:0.6;
    }
    .card:hover{
      transform:translateY(5px) scale(1.05);
      box-shadow:0 0 0 rgba(0,0,0,0.5);
    }

    .card img{
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid rgba(255,255,255,0.4);
      margin-bottom:20px;
      transition:0.5s;
    }

    .card:hover img{
      transform:rotate(8deg) scale(1.1);
    }

    .card h2{
      font-size:30px;
      margin-bottom:10px;
      letter-spacing:1px;
    }

    .card p{
      width:80%;
      font-size:15px;
      line-height:24px;
      color:#f1f1f1;
    }

    .btn{
      margin-top:25px;
      padding:12px 28px;
      border:none;
      border-radius:30px;
      background:rgba(255,255,255,0.2);
      color:white;
      font-size:16px;
      cursor:pointer;
      backdrop-filter:blur(5px);
      transition:0.4s;
    }

    .btn:hover{
      background:white;
      color:#111;
      transform:scale(1.1);
    }
  </style>
</head>
<body>

  <div class="card">
    
    <img src="car1.jpeg" alt="profile">

    <h2>Glass Card</h2>

    <p>
     Glass effect  using car 
    </p>

    <button class="btn">Explore</button>

  </div>

</body>
</html>
