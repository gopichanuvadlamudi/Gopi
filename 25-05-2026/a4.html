<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .body{
            height: 120vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: black;
            font-family: 'Times New Roman', Times, serif;
            overflow: hidden;
        }
         .text{
      font-size:80px;
      font-weight:bold;
      color:white;
      letter-spacing:8px;
      text-transform:uppercase;

      animation:glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow{

      0%{
        transform:scale(1);
        color:#ffffff;
        text-shadow:
        0 0 10px #fff,
        0 0 20px #00ffff,
        0 0 40px #00ffff;
      }

      100%{
        transform:scale(1.1);
        color:#00ffff;
        text-shadow:
        0 0 20px #fff,
        0 0 40px #00ffff,
        0 0 80px #00ffff;
      }
    }


        .container{
            position: relative;
            height: 400px;
            width: 700px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            position:absolute;
            width:170px;
            height:250px;
            border-radius:20px;
            overflow:hidden;
            cursor:pointer;
            transition:0.6s ease;
            box-shadow:0 12px 25px rgba(0,0,0,0.25);
            animation:float 4s ease-in-out infinite;
        }
        .card img{
           width:100%;
           height:100%;
           object-fit:cover;
       }

        /* Card Positions */

    .card1{
      transform:rotate(-35deg) translateX(-220px);
      z-index:1;
      animation-delay:0s;
    }

    .card2{
      transform:rotate(-18deg) translateX(-120px);
      z-index:2;
      animation-delay:0.5s;
    }

    .card3{
      transform:translateX(-20px);
      z-index:5;
      animation-delay:1s;
    }

    .card4{
      transform:rotate(18deg) translateX(120px);
      z-index:3;
      animation-delay:1.5s;
    }

    .card5{
      transform:rotate(35deg) translateX(220px);
      z-index:1;
      animation-delay:2s;
    }
    .container:hover .card1{
        transform: rotate(-45deg) translateX(-300px) translateY(-20px);
    }

     .container:hover .card2{
        transform: rotate(-28deg) translateX(-170px) translateY(-30px);
    }

    .container:hover .card3{
        transform: translateX(-70px) scale(1);
    }

    .container:hover .card4{
        transform: rotate(28deg) translateX(170px) translateY(30px);
    }

    .container:hover .card5{
        transform: rotate(45deg) translateX(300px) translateY(20px);
    }
    @keyframes float{
        0%{
            margin-top: 0;
        }
        50%{
        margin-top:-15px;
      }
       100%{
        margin-top:0;
      }
    }
        

    </style>
</head>
<body>
      <div class="section">

        <h1 class="text">Animation</h1>
        </div>

        <div class="container">
      
        <div class="card card1">
      <img src="car1.jpeg" alt="">
    </div>

    <div class="card card2">
      <img src="car2.jpeg" alt="">
    </div>

    <div class="card card3">
      <img src="car3.jpeg" alt="">
    </div>

    <div class="card card4">
      <img src="car4.jpeg" alt="">
    </div>

    <div class="card card5">
      <img src="car5.jpeg" alt="">
    </div>
    </div>
</body>
</html>
