  <body>
    <h1>Traffic signals</h1>
    <script>
      let signal = "Green";

      if (signal === "Red") {
        console.log("Stop");
      } else if (signal === "Yellow") {
        console.log("Prepare To Move");
      } else if (signal === "Green") {
        console.log("move");
      } else {
        console.log("Invalid Signal");
      }
    </script>
